{% extends "base.html" %}

{% block title %}AI-Based Notes Summarizer{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <h3 class="text-center mb-4"><i class="fas fa-brain"></i>AI-Based Notes Summarizer</h3>
                
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Choose Input:</label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="input_type" id="text_input" value="text" checked>
                            <label class="btn btn-outline-primary" for="text_input">Text</label>
                            
                            <input type="radio" class="btn-check" name="input_type" id="pdf_input" value="pdf">
                            <label class="btn btn-outline-primary" for="pdf_input">PDF / Image</label>
                        </div>
                    </div>

                    <div id="text_section">
                        <textarea class="form-control" name="text" rows="8" placeholder="Paste your text here..."></textarea>
                    </div>

                    <div id="pdf_section" style="display:none;">
                        <label class="form-label">Upload PDF or Image (JPG/PNG)</label>
                        <input class="form-control" type="file" name="file" accept=".pdf, .png, .jpg, .jpeg">
                    </div>

                    <hr class="my-4">

                    <div class="mb-3">
                        <label class="form-label fw-bold">Generate:</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="generate_summary" id="generate_summary" checked>
                            <label class="form-check-label" for="generate_summary">Summary & Keywords</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="generate_quiz" id="generate_quiz">
                            <label class="form-check-label" for="generate_quiz">Quiz</label>
                            <input type="number" class="form-control form-control-sm mt-1" name="quiz_count" placeholder="Number (1-20)" min="1" max="20">
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="generate_flashcards" id="generate_flashcards">
                            <label class="form-check-label" for="generate_flashcards">Flashcards</label>
                            <input type="number" class="form-control form-control-sm mt-1" name="flashcard_count" placeholder="Number (1-20)" min="1" max="20">
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="enable_qa" id="enable_qa">
                            <label class="form-check-label" for="enable_qa">Q&A Mode</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="fas fa-magic"></i> Process
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
document.querySelectorAll('input[name="input_type"]').forEach(radio => {
    radio.addEventListener('change', function() {
        document.getElementById('text_section').style.display = 'none';
        document.getElementById('pdf_section').style.display = 'none';
        document.getElementById(this.value + '_section').style.display = 'block';
    });
});
</script>
{% endblock %}
